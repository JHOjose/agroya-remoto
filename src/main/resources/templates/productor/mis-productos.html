<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/base :: head('Mis productos')}"></head>
<body>
<nav th:replace="~{fragments/base :: navbar}"></nav>

<main class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <h1 class="h4 fw-semibold mb-0">Mis productos</h1>
    <a th:href="@{/productos/nuevo}" class="btn btn-success">
      <i class="bi bi-plus-lg me-1"></i>Añadir producto
    </a>
  </div>

  <div id="alertContainer" role="alert" aria-live="polite"></div>

  <!-- Tabla -->
  <div class="card shadow-sm border-0">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Producto</th>
              <th>Categoría</th>
              <th class="text-end">Precio</th>
              <th class="text-center">Stock</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="5" class="text-center py-4">
              <div class="spinner-border text-success" role="status">
                <span class="visually-hidden">Cargando...</span>
              </div>
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="sinProductos" class="text-center py-5 d-none">
    <i class="bi bi-box-seam fs-1 text-muted" aria-hidden="true"></i>
    <p class="mt-3 text-muted">Aún no has añadido productos.</p>
    <a th:href="@{/productos/nuevo}" class="btn btn-success mt-1">Añadir primer producto</a>
  </div>
</main>

<div th:replace="~{fragments/base :: scripts}"></div>
<script>
if (!getToken()) window.location.href = '/login';

document.addEventListener('DOMContentLoaded', async () => {
  const msg = sessionStorage.getItem('agroya_msg');
  if (msg) { mostrarAlerta(msg, 'success'); sessionStorage.removeItem('agroya_msg'); }

  try {
    const productos = await apiFetch('/api/productos/mis-productos');

    renderTabla(productos ?? []);
  } catch(err) {
    mostrarAlerta('Error al cargar: ' + err.message);
  }
});

function renderTabla(lista) {
  const tbody = document.getElementById('tbody');
  if (!lista.length) {
    tbody.innerHTML = '';
    document.getElementById('sinProductos').classList.remove('d-none');
    return;
  }
  tbody.innerHTML = lista.map(p => {
    const precio = new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(p.precio);
    const stockClass = p.stock <= 0 ? 'text-danger' : p.stock <= 10 ? 'text-warning' : 'text-success';
    return `
    <tr>
      <td>
        <div class="d-flex align-items-center gap-2">
          ${p.imageUrl
            ? `<img src="${escHtml(p.imageUrl)}" width="40" height="40"
                   class="rounded-2 object-fit-cover" alt="${escHtml(p.nombre)}">`
            : `<div class="rounded-2 bg-success bg-opacity-10 d-flex align-items-center
                   justify-content-center" style="width:40px;height:40px;">
                 <i class="bi bi-box-seam text-success small"></i></div>`}
          <div>
            <div class="fw-medium">${escHtml(p.nombre)}</div>
            <div class="text-muted small">${escHtml(p.descripcion?.substring(0,40) ?? '')}…</div>
          </div>
        </div>
      </td>
      <td><span class="badge bg-light text-dark border">${escHtml(p.categoriaNombre ?? '—')}</span></td>
      <td class="text-end fw-semibold">${precio}</td>
      <td class="text-center">
        <span class="${stockClass} fw-medium">${p.stock} ${escHtml(p.unidad ?? '')}</span>
      </td>
      <td class="text-center">
        <div class="btn-group btn-group-sm">
          <a href="/productos/${p.id}" class="btn btn-outline-secondary" title="Ver">
            <i class="bi bi-eye"></i></a>
          <a href="/productos/${p.id}/editar" class="btn btn-outline-primary" title="Editar">
            <i class="bi bi-pencil"></i></a>
          <button onclick="eliminar(${p.id})" class="btn btn-outline-danger" title="Eliminar">
            <i class="bi bi-trash"></i></button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

async function eliminar(id) {
  if (!confirm('¿Eliminar este producto?')) return;
  try {
    await apiFetch('/api/productos/' + id, { method: 'DELETE' });
    mostrarAlerta('Producto eliminado.', 'success');
    setTimeout(() => location.reload(), 1200);
  } catch(err) { mostrarAlerta('Error: ' + err.message); }
}
</script>
</body>
</html>
