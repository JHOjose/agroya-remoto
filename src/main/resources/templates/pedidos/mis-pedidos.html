<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/base :: head('Mis pedidos')}"></head>
<body>
<nav th:replace="~{fragments/base :: navbar}"></nav>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h1 class="h4 fw-semibold mb-0">Mis pedidos</h1>
        <a th:href="@{/productos}" class="btn btn-outline-success btn-sm">
            <i class="bi bi-basket3 me-1"></i>Seguir comprando
        </a>
    </div>

    <div id="alertContainer" role="alert" aria-live="polite"></div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>#</th><th>Fecha</th><th>Estado</th>
                        <th>Municipio</th><th class="text-end">Total</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="tbody">
                    <tr><td colspan="6" class="text-center py-4">
                        <div class="spinner-border text-success" role="status"></div>
                    </td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="sinPedidos" class="text-center py-5 d-none">
        <i class="bi bi-bag-x fs-1 text-muted"></i>
        <p class="mt-3 text-muted">Aún no tienes pedidos.</p>
        <a th:href="@{/productos}" class="btn btn-success mt-1">Ver productos</a>
    </div>
</main>

<!-- Modal editar: municipio como SELECT, dirección como text -->
<div class="modal fade" id="modalEditar" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-pencil me-2"></i>Editar datos de envío</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editPedidoId">
                <div class="mb-3">
                    <label for="editMunicipio" class="form-label fw-medium">Municipio *</label>
                    <!-- SELECT con municipios del Huila — se llena con municipios.js -->
                    <select class="form-select" id="editMunicipio" required></select>
                </div>
                <div class="mb-3">
                    <label for="editDireccion" class="form-label fw-medium">Dirección *</label>
                    <input type="text" class="form-control" id="editDireccion"
                           placeholder="Cra 5 #10-20, Barrio Centro">
                </div>
                <div id="alertEditModal" role="alert" aria-live="polite"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-primary" id="btnGuardarEdit">
                    <span class="spinner-border spinner-border-sm d-none me-1" id="editSpinner"></span>
                    Guardar cambios
                </button>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/municipios.js}"></script>
<div th:replace="~{fragments/base :: scripts}"></div>
<script>
    if (!getToken()) window.location.href = '/login';

    // Pre-llenar el select al abrir la página
    llenarSelectMunicipios('editMunicipio');

    document.addEventListener('DOMContentLoaded', async () => {
        const msg = sessionStorage.getItem('agroya_msg');
        if (msg) { mostrarAlerta(msg, 'success'); sessionStorage.removeItem('agroya_msg'); }
        await cargarPedidos();
    });

    async function cargarPedidos() {
        try {
            const pedidos = await apiFetch('/api/pedidos/mis-pedidos');
            renderTabla(pedidos ?? []);
        } catch(err) { mostrarAlerta('Error: ' + err.message); }
    }

    const BADGES = {
        PENDIENTE:'bg-warning text-dark', PAGADO:'bg-info text-dark',
        ENVIADO:'bg-primary', ENTREGADO:'bg-success', CANCELADO:'bg-danger'
    };

    function renderTabla(lista) {
        const tbody = document.getElementById('tbody');
        if (!lista.length) {
            tbody.innerHTML = '';
            document.getElementById('sinPedidos').classList.remove('d-none');
            return;
        }
        tbody.innerHTML = lista.map(p => {
            const fecha = new Date(p.fecha).toLocaleDateString('es-CO',
                {day:'2-digit',month:'short',year:'numeric'});
            const total = new Intl.NumberFormat('es-CO',
                {style:'currency',currency:'COP',maximumFractionDigits:0}).format(p.total);
            const badge = BADGES[p.estado] ?? 'bg-secondary';
            const editable = p.estado === 'PENDIENTE';
            return `
    <tr>
      <td class="text-muted small">#${p.id}</td>
      <td>${fecha}</td>
      <td><span class="badge ${badge}">${p.estado}</span></td>
      <td>${escHtml(p.municipioEnvio ?? '—')}</td>
      <td class="text-end fw-semibold">${total}</td>
      <td class="text-center">
        <div class="btn-group btn-group-sm">
          <a href="/pedidos/${p.id}" class="btn btn-outline-secondary" title="Ver">
            <i class="bi bi-eye"></i></a>
          ${editable ? `
          <button onclick="abrirEditar(${p.id},'${escHtml(p.municipioEnvio??'')}','${escHtml(p.direccionEnvio??'')}')"
                  class="btn btn-outline-primary" title="Editar">
            <i class="bi bi-pencil"></i></button>
          <button onclick="cancelar(${p.id})"
                  class="btn btn-outline-danger" title="Cancelar">
            <i class="bi bi-x-lg"></i></button>` : ''}
        </div>
      </td>
    </tr>`;
        }).join('');
    }

    function abrirEditar(id, municipio, direccion) {
        document.getElementById('editPedidoId').value = id;
        document.getElementById('editDireccion').value = direccion;
        // Seleccionar municipio correcto en el dropdown
        llenarSelectMunicipios('editMunicipio', municipio);
        document.getElementById('alertEditModal').innerHTML = '';
        new bootstrap.Modal(document.getElementById('modalEditar')).show();
    }

    document.getElementById('btnGuardarEdit').addEventListener('click', async () => {
        const id        = document.getElementById('editPedidoId').value;
        const municipio = document.getElementById('editMunicipio').value;
        const direccion = document.getElementById('editDireccion').value.trim();
        const alertEl   = document.getElementById('alertEditModal');
        const btn       = document.getElementById('btnGuardarEdit');
        const sp        = document.getElementById('editSpinner');

        if (!municipio || !direccion) {
            alertEl.innerHTML = `<div class="alert alert-warning mt-2 mb-0">Completa todos los campos.</div>`;
            return;
        }
        btn.disabled = true; sp.classList.remove('d-none');
        try {
            await apiFetch('/api/pedidos/' + id, {
                method: 'PUT',
                body: JSON.stringify({ municipioEnvio: municipio, direccionEnvio: direccion }),
            });
            bootstrap.Modal.getInstance(document.getElementById('modalEditar')).hide();
            mostrarAlerta('✅ Pedido actualizado.', 'success');
            await cargarPedidos();
        } catch(err) {
            alertEl.innerHTML = `<div class="alert alert-danger mt-2 mb-0">${escHtml(err.message)}</div>`;
        } finally { btn.disabled = false; sp.classList.add('d-none'); }
    });

    async function cancelar(id) {
        if (!confirm('¿Cancelar este pedido?')) return;
        try {
            await apiFetch('/api/pedidos/' + id + '/cancelar', { method:'PUT' });
            mostrarAlerta('Pedido cancelado.', 'warning');
            await cargarPedidos();
        } catch(err) { mostrarAlerta('Error: ' + err.message); }
    }
</script>
</body>
</html>
