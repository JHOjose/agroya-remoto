<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/base :: head('Detalle del pedido')}"></head>
<body>
<nav th:replace="~{fragments/base :: navbar}"></nav>

<main class="container py-4" style="max-width:760px;">
  <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm mb-4">
    <i class="bi bi-arrow-left me-1"></i>Volver
  </a>

  <div id="alertContainer" role="alert" aria-live="polite"></div>
  <div id="skeleton" class="placeholder-glow">
    <div class="placeholder col-5 mb-3" style="height:1.8rem;"></div>
    <div class="placeholder col-12 mb-2"></div>
    <div class="placeholder col-8"></div>
  </div>
  <div id="contenido" class="d-none">
    <!-- Encabezado -->
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-4">
      <div>
        <h1 class="h4 fw-semibold mb-1">Pedido <span id="pedidoNum"></span></h1>
        <p class="text-muted small mb-0" id="pedidoFecha"></p>
      </div>
      <span id="pedidoEstado" class="badge fs-6"></span>
    </div>

    <div class="row g-4">
      <!-- Items -->
      <div class="col-md-7">
        <div class="card border-0 shadow-sm">
          <div class="card-header bg-white fw-semibold py-3">
            <i class="bi bi-bag me-2 text-success"></i>Productos
          </div>
          <ul class="list-group list-group-flush" id="itemsList"></ul>
          <div class="card-footer bg-white py-3 d-flex justify-content-between">
            <span class="fw-semibold">Total</span>
            <span class="fw-bold text-success fs-5" id="pedidoTotal"></span>
          </div>
        </div>
      </div>

      <!-- Info envío -->
      <div class="col-md-5">
        <div class="card border-0 shadow-sm mb-3">
          <div class="card-header bg-white fw-semibold py-3">
            <i class="bi bi-geo-alt me-2 text-success"></i>Envío
          </div>
          <div class="card-body">
            <p class="mb-1"><strong>Municipio:</strong> <span id="envMunicipio"></span></p>
            <p class="mb-0"><strong>Dirección:</strong> <span id="envDireccion"></span></p>
          </div>
        </div>

        <div class="card border-0 shadow-sm">
          <div class="card-header bg-white fw-semibold py-3">
            <i class="bi bi-person me-2 text-success"></i>Comprador
          </div>
          <div class="card-body">
            <p class="mb-0" id="compradorNombre"></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<div th:replace="~{fragments/base :: scripts}"></div>
<script>
const PEDIDO_ID = parseInt(window.location.pathname.split('/').pop());
if (!getToken()) window.location.href = '/login';

document.addEventListener('DOMContentLoaded', async () => {
  try {
    const p = await apiFetch('/api/pedidos/' + PEDIDO_ID);
    if (!p) return;
    render(p);
  } catch(err) {
    mostrarAlerta('Error al cargar el pedido: ' + err.message);
  }
});

const ESTADO_BADGE = {
  PENDIENTE: 'bg-warning text-dark',
  PAGADO:    'bg-info text-dark',
  ENVIADO:   'bg-primary',
  ENTREGADO: 'bg-success',
  CANCELADO: 'bg-danger',
};

function render(p) {
  document.getElementById('skeleton').classList.add('d-none');
  document.getElementById('contenido').classList.remove('d-none');
  document.title = 'Pedido #' + p.id + ' | AgroYa';

  const fecha = new Date(p.fecha).toLocaleString('es-CO',
    {day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});

  document.getElementById('pedidoNum').textContent    = '#' + p.id;
  document.getElementById('pedidoFecha').textContent  = fecha;
  document.getElementById('envMunicipio').textContent = p.municipioEnvio ?? '—';
  document.getElementById('envDireccion').textContent = p.direccionEnvio ?? '—';
  document.getElementById('compradorNombre').textContent = p.compradorNombre ?? '—';

  const estadoEl = document.getElementById('pedidoEstado');
  estadoEl.textContent = p.estado;
  estadoEl.className = 'badge fs-6 ' + (ESTADO_BADGE[p.estado] ?? 'bg-secondary');

  const total = new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(p.total);
  document.getElementById('pedidoTotal').textContent = total;

  const itemsList = document.getElementById('itemsList');
  itemsList.innerHTML = (p.items ?? []).map(item => {
    const subtotal = new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(item.precioUnitario * item.cantidad);
    return `
    <li class="list-group-item py-3">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <div class="fw-medium">${escHtml(item.nombreProducto ?? 'Producto')}</div>
          <div class="text-muted small">
            ${item.cantidad} × ${new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(item.precioUnitario)}
          </div>
        </div>
        <div class="fw-semibold">${subtotal}</div>
      </div>
    </li>`;
  }).join('');
}
</script>
</body>
</html>
