<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/base :: head('Logística')}"></head>
<body>
<nav th:replace="~{fragments/base :: navbar}"></nav>

<main class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <div>
      <h1 class="h4 fw-semibold mb-0">
        <i class="bi bi-truck me-2 text-success"></i>Logística por municipio
      </h1>
      <p class="text-muted small mb-0 mt-1">
        Pedidos pendientes agrupados para optimizar el transporte compartido
      </p>
    </div>
    <button class="btn btn-outline-success btn-sm" onclick="cargarGrupos()">
      <i class="bi bi-arrow-clockwise me-1"></i>Actualizar
    </button>
  </div>

  <div id="alertContainer" role="alert" aria-live="polite"></div>

  <div class="card shadow-sm border-0 mb-4">
    <div class="card-body py-3">
      <div class="row g-2 align-items-end">
        <div class="col-md-6">
          <label for="filtroMunicipio" class="form-label small fw-medium mb-1">
            Filtrar por municipio
          </label>
          <select class="form-select form-select-sm" id="filtroMunicipio">
            <option value="">Seleccione un municipio</option>
          </select>
        </div>
        <div class="col-md-3">
          <button class="btn btn-primary btn-sm w-100" onclick="filtrarMunicipio()">
            <i class="bi bi-search me-1"></i>Buscar municipio
          </button>
        </div>
        <div class="col-md-3">
          <button class="btn btn-outline-secondary btn-sm w-100" onclick="cargarGrupos()">
            Ver todos
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="gruposContainer">
    <div class="text-center py-5">
      <div class="spinner-border text-success" role="status">
        <span class="visually-hidden">Cargando...</span>
      </div>
    </div>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-3 mt-5">
    <h2 class="h5 fw-semibold mb-0">
      <i class="bi bi-truck me-2 text-success"></i>Rutas de despacho activas
    </h2>
    <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#modalCrearRuta">
      <i class="bi bi-plus-lg me-1"></i>Nueva ruta
    </button>
  </div>

  <div id="rutasContainer">
    <div class="text-center py-3 text-muted small">Cargando rutas...</div>
  </div>

  <div class="modal fade" id="modalCrearRuta" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">
            <i class="bi bi-truck me-2 text-success"></i>Crear ruta de despacho
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p class="text-muted small mb-3">
            Se agruparán automáticamente <strong>todos los pedidos pendientes</strong>
            del municipio seleccionado en esta ruta.
          </p>
          <div class="mb-3">
            <label class="form-label fw-medium">Municipio</label>
            <select class="form-select" id="rutaMunicipio">
              <option value="">Seleccione un municipio</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-medium">Fecha programada de despacho</label>
            <input type="date" class="form-control" id="rutaFecha">
          </div>
          <div id="alertModalRuta"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-success" id="btnCrearRuta">
            <span class="spinner-border spinner-border-sm d-none me-1" id="rutaSpinner"></span>
            Crear ruta
          </button>
        </div>
      </div>
    </div>
  </div>

</main>

<div th:replace="~{fragments/base :: scripts}"></div>
<script src="/js/municipios.js"></script>

<script>
  if (!getToken()) window.location.href = '/login';

  // --- ESTADOS DE LAS RUTAS ---
  const ESTADO_CONFIG = {
    PROGRAMADO:  { badge: 'bg-warning text-dark', label: 'Programado',  accion: 'EN_TRANSITO',  btnLabel: 'Marcar en tránsito', btnClass: 'btn-primary' },
    EN_TRANSITO: { badge: 'bg-primary',           label: 'En tránsito', accion: 'COMPLETADO',   btnLabel: 'Marcar entregado',   btnClass: 'btn-success' },
    COMPLETADO:  { badge: 'bg-success',           label: 'Completado',  accion: null,           btnLabel: null,                 btnClass: null },
    CANCELADO:   { badge: 'bg-danger',            label: 'Cancelado',   accion: null,           btnLabel: null,                 btnClass: null }
  };

  // --- INICIALIZACIÓN ---
  document.addEventListener('DOMContentLoaded', () => {
    cargarMunicipios();

    // Asignar la fecha mínima al input de fecha del modal
    document.getElementById('rutaFecha').min = new Date().toISOString().split('T')[0];

    cargarGrupos();
    cargarRutas();
  });

  // --- FUNCIONES DE MUNICIPIOS ---
  function cargarMunicipios() {
    const selectFiltro = document.getElementById('filtroMunicipio');
    const selectRuta = document.getElementById('rutaMunicipio');

    if (typeof MUNICIPIOS_HUILA !== 'undefined') {
      MUNICIPIOS_HUILA.forEach(municipio => {
        // Llenar select del filtro
        const optionFiltro = document.createElement('option');
        optionFiltro.value = municipio;
        optionFiltro.textContent = municipio;
        selectFiltro.appendChild(optionFiltro);

        // Llenar select del modal de creación
        const optionRuta = document.createElement('option');
        optionRuta.value = municipio;
        optionRuta.textContent = municipio;
        selectRuta.appendChild(optionRuta);
      });
    }
  }

  // --- LÓGICA DE PEDIDOS PENDIENTES (GRUPOS) ---
  async function cargarGrupos() {
    const container = document.getElementById('gruposContainer');
    container.innerHTML = `<div class="text-center py-5">
      <div class="spinner-border text-success" role="status"></div></div>`;
    try {
      const grupos = await apiFetch('/api/logistica/agrupar');
      renderGrupos(grupos ?? []);
    } catch(err) {
      container.innerHTML = `<div class="alert alert-danger">Error: ${escHtml(err.message)}</div>`;
    }
  }

  async function filtrarMunicipio() {
    const municipio = document.getElementById('filtroMunicipio').value.trim();
    if (!municipio) { cargarGrupos(); return; }

    const container = document.getElementById('gruposContainer');
    container.innerHTML = `<div class="text-center py-5">
      <div class="spinner-border text-success" role="status"></div></div>`;
    try {
      const grupos = await apiFetch('/api/logistica/agrupar/' + encodeURIComponent(municipio));
      renderGrupos(grupos ?? []);
    } catch(err) {
      container.innerHTML = `<div class="alert alert-warning">No se encontraron pedidos para "${escHtml(municipio)}".</div>`;
    }
  }

  function renderGrupos(lista) {
    const container = document.getElementById('gruposContainer');
    if (!lista.length) {
      container.innerHTML = `
          <div class="text-center py-5">
            <i class="bi bi-check-circle-fill text-success fs-1" aria-hidden="true"></i>
            <p class="mt-3 text-muted">No hay pedidos pendientes por agrupar. ¡Todo en orden!</p>
          </div>`;
      return;
    }

    const totalPedidos = lista.reduce((s, g) => s + g.totalPedidos, 0);
    container.innerHTML = `
      <div class="alert alert-success d-flex align-items-center gap-2 mb-4">
        <i class="bi bi-truck fs-5" aria-hidden="true"></i>
        <span><strong>${lista.length} municipios</strong> con <strong>${totalPedidos} pedidos</strong> pendientes de despacho</span>
      </div>
      <div class="row g-3" id="gruposGrid"></div>`;

    const grid = document.getElementById('gruposGrid');
    lista.forEach(g => {
      const card = document.createElement('div');
      card.className = 'col-md-6 col-xl-4';
      card.innerHTML = `
          <div class="card border-0 shadow-sm h-100">
            <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
              <div>
                <i class="bi bi-geo-alt-fill text-success me-1" aria-hidden="true"></i>
                <strong>${escHtml(g.municipio)}</strong>
              </div>
              <span class="badge bg-success rounded-pill">${g.totalPedidos} pedido${g.totalPedidos !== 1 ? 's' : ''}</span>
            </div>
            <div class="card-body p-0">
              <ul class="list-group list-group-flush">
                ${g.pedidos.map(p => {
        const total = new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(p.total);
        const fecha = new Date(p.fecha).toLocaleDateString('es-CO',{day:'2-digit',month:'short'});
        return `
                  <li class="list-group-item px-3 py-2">
                    <div class="d-flex justify-content-between align-items-start">
                      <div>
                        <div class="fw-medium small">${escHtml(p.compradorNombre)}</div>
                        <div class="text-muted" style="font-size:.75rem;">
                          <i class="bi bi-house me-1" aria-hidden="true"></i>${escHtml(p.direccionEnvio ?? '—')}
                        </div>
                        <div class="text-muted" style="font-size:.75rem;">
                          <i class="bi bi-calendar me-1" aria-hidden="true"></i>${fecha}
                        </div>
                      </div>
                      <div class="text-end">
                        <div class="fw-semibold text-success small">${total}</div>
                        <a href="/pedidos/${p.id}" class="btn btn-outline-secondary btn-sm mt-1 py-0 px-2" style="font-size:.7rem;">
                          <i class="bi bi-eye" aria-hidden="true"></i>
                        </a>
                      </div>
                    </div>
                  </li>`;
      }).join('')}
              </ul>
            </div>
            <div class="card-footer bg-white py-2 text-end">
              <small class="text-muted fw-medium">
                Total municipio: <span class="text-success">${new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(g.pedidos.reduce((s,p) => s + (p.total ?? 0), 0))}</span>
              </small>
            </div>
          </div>`;
      grid.appendChild(card);
    });
  }

  // --- LÓGICA DE RUTAS ACTIVAS ---
  async function cargarRutas() {
    const container = document.getElementById('rutasContainer');
    try {
      const rutas = await apiFetch('/api/logistica/grupos');
      renderRutas(rutas ?? []);
    } catch(err) {
      container.innerHTML = `<div class="alert alert-danger small">Error al cargar rutas: ${escHtml(err.message)}</div>`;
    }
  }

  function renderRutas(lista) {
    const container = document.getElementById('rutasContainer');
    if (!lista.length) {
      container.innerHTML = `<p class="text-muted small">No hay rutas activas. Crea una desde el botón "Nueva ruta".</p>`;
      return;
    }

    container.innerHTML = `<div class="row g-3">${lista.map(r => {
      const cfg = ESTADO_CONFIG[r.estado] ?? ESTADO_CONFIG.PROGRAMADO;
      const total = new Intl.NumberFormat('es-CO', {style:'currency',currency:'COP',maximumFractionDigits:0}).format(r.totalEstimado ?? 0);
      const fecha = r.fechaProgramada
              ? new Date(r.fechaProgramada + 'T00:00:00').toLocaleDateString('es-CO', {day:'2-digit',month:'long',year:'numeric'})
              : '—';

      return `
        <div class="col-md-6 col-xl-4">
            <div class="card border-0 shadow-sm">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <div>
                        <i class="bi bi-geo-alt-fill text-success me-1"></i>
                        <strong>${escHtml(r.municipio)}</strong>
                    </div>
                    <span class="badge ${cfg.badge}">${cfg.label}</span>
                </div>
                <div class="card-body py-2">
                    <div class="d-flex justify-content-between small text-muted mb-1">
                        <span><i class="bi bi-calendar me-1"></i>${fecha}</span>
                        <span><i class="bi bi-bag me-1"></i>${r.totalPedidos} pedido${r.totalPedidos !== 1 ? 's' : ''}</span>
                    </div>
                    <div class="fw-bold text-success">${total}</div>
                </div>
                ${cfg.accion ? `
                <div class="card-footer py-2 text-end">
                    <button class="btn ${cfg.btnClass} btn-sm" onclick="cambiarEstado(${r.id}, '${cfg.accion}')">
                        ${cfg.btnLabel}
                    </button>
                </div>` : ''}
            </div>
        </div>`;
    }).join('')}</div>`;
  }

  async function cambiarEstado(id, estado) {
    try {
      await apiFetch(`/api/logistica/grupos/${id}/estado?estado=${estado}`, { method: 'PATCH' });
      cargarRutas();
      cargarGrupos(); // refresca los pedidos
    } catch(err) {
      alert('Error: ' + err.message); // Usamos un alert simple si no tienes la función mostrarAlerta
    }
  }

  // --- CREACIÓN DE NUEVA RUTA (EVENTO DEL MODAL) ---
  document.getElementById('btnCrearRuta')?.addEventListener('click', async () => {
    const municipio = document.getElementById('rutaMunicipio').value;
    const fecha = document.getElementById('rutaFecha').value;
    const alertEl = document.getElementById('alertModalRuta');

    if (!municipio || !fecha) {
      alertEl.innerHTML = `<div class="alert alert-warning small mb-0">Selecciona municipio y fecha.</div>`;
      return;
    }

    const spinner = document.getElementById('rutaSpinner');
    const btn = document.getElementById('btnCrearRuta');

    btn.disabled = true;
    spinner.classList.remove('d-none');
    alertEl.innerHTML = ''; // Limpiar alertas previas

    try {
      await apiFetch('/api/logistica/grupos', {
        method: 'POST',
        body: JSON.stringify({ municipio, fechaProgramada: fecha })
      });

      // Cerrar modal
      bootstrap.Modal.getInstance(document.getElementById('modalCrearRuta')).hide();

      // Limpiar formulario y refrescar datos
      document.getElementById('rutaMunicipio').value = '';
      document.getElementById('rutaFecha').value = '';
      cargarRutas();
      cargarGrupos();
    } catch(err) {
      alertEl.innerHTML = `<div class="alert alert-danger small mb-0">${escHtml(err.message)}</div>`;
    } finally {
      btn.disabled = false;
      spinner.classList.add('d-none');
    }
  });
</script>
</body>
</html>
