<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">

<head th:replace="~{fragments/base :: head('Productos')}"></head>

<body>
<nav th:replace="~{fragments/base :: navbar}"></nav>

<!-- ── Cabecera de sección ── -->
<section class="bg-success bg-gradient text-white py-4">
    <div class="container">
        <h1 class="h3 mb-1 fw-semibold" th:text="#{products.title}">Catálogo de productos</h1>
        <p class="mb-0 opacity-75" th:text="#{products.subtitle}">
            Frescos del campo, directo a tu mesa
        </p>
    </div>
</section>

<main class="container py-4">

    <!-- Barra de búsqueda + filtros -->
    <div class="row g-3 mb-4 align-items-end">
        <div class="col-md-6">
            <label for="buscarInput" class="form-label visually-hidden"
                   th:text="#{products.search}">Buscar</label>
            <div class="input-group">
                <span class="input-group-text bg-white">
                    <i class="bi bi-search text-muted" aria-hidden="true"></i>
                </span>
                <input type="text" class="form-control" id="buscarInput"
                       th:placeholder="#{products.search.placeholder}"
                       th:value="${buscarFiltro}">
            </div>
        </div>
        <div class="col-md-4">
            <label for="categoriaSelect" class="form-label visually-hidden"
                   th:text="#{products.category}">Categoría</label>
            <select class="form-select" id="categoriaSelect">
                <option value="" th:text="#{products.all.categories}">
                    Todas las categorías
                </option>
                <!-- Se llena dinámicamente desde JS -->
            </select>
        </div>
        <div class="col-md-2">
            <button class="btn btn-outline-success w-100" id="btnFiltrar"
                    th:text="#{products.filter}">Filtrar</button>
        </div>
    </div>

    <!-- Alertas -->
    <div id="alertContainer" role="alert" aria-live="polite"></div>

    <!-- Botón "Añadir producto" (solo productor/admin) -->
    <div class="mb-3" sec:authorize="hasAnyRole('PRODUCTOR','ADMIN')">
        <a th:href="@{/productos/nuevo}" class="btn btn-success">
            <i class="bi bi-plus-lg me-1" aria-hidden="true"></i>
            <span th:text="#{products.add}">Añadir producto</span>
        </a>
    </div>

    <!-- Grid de productos (se rellena con JS) -->
    <div id="productosGrid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-4 g-4"
         aria-label="Listado de productos" aria-live="polite">
        <!-- Skeleton mientras carga -->
        <div class="col" id="skeletonTemplate" aria-hidden="true">
            <div class="card h-100 border-0 shadow-sm placeholder-glow">
                <div class="placeholder" style="height:180px;border-radius:.375rem .375rem 0 0;"></div>
                <div class="card-body">
                    <h6 class="placeholder col-8"></h6>
                    <p class="placeholder col-5"></p>
                    <p class="placeholder col-10 small"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Sin resultados -->
    <div id="sinResultados" class="text-center py-5 d-none">
        <i class="bi bi-search fs-1 text-muted" aria-hidden="true"></i>
        <p class="mt-3 text-muted" th:text="#{products.empty}">
            No se encontraron productos con ese criterio.
        </p>
    </div>

</main>

<div th:replace="~{fragments/base :: scripts}"></div>

<script>
/* ── Estado ─────────────────────────────────── */
let todosLosProductos = [];
let categorias        = new Set();

/* ── Carga inicial ──────────────────────────── */
document.addEventListener('DOMContentLoaded', async () => {
    mostrarSkeletons(8);
    try {
        todosLosProductos = await apiFetch('/api/productos');
        if (!todosLosProductos) return;
        construirCategorias(todosLosProductos);
        renderProductos(todosLosProductos);
    } catch (err) {
        ocultarSkeletons();
        mostrarAlerta('Error al cargar los productos: ' + err.message);
    }
});

/* ── Filtro ──────────────────────────────────── */
document.getElementById('btnFiltrar').addEventListener('click', filtrar);
document.getElementById('buscarInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') filtrar();
});

function filtrar() {
    const buscar    = document.getElementById('buscarInput').value.toLowerCase().trim();
    const categoria = document.getElementById('categoriaSelect').value;

    const filtrados = todosLosProductos.filter(p => {
        const coincideBuscar    = !buscar || p.nombre.toLowerCase().includes(buscar)
                                           || (p.descripcion || '').toLowerCase().includes(buscar);
        const coincideCategoria = !categoria || p.categoriaNombre === categoria;
        return coincideBuscar && coincideCategoria;
    });

    renderProductos(filtrados);
}

/* ── Render ──────────────────────────────────── */
function construirCategorias(productos) {
    const select = document.getElementById('categoriaSelect');
    productos.forEach(p => { if (p.categoriaNombre) categorias.add(p.categoriaNombre); });
    categorias.forEach(cat => {
        const opt = document.createElement('option');
        opt.value       = cat;
        opt.textContent = cat;
        select.appendChild(opt);
    });
}

function renderProductos(lista) {
    ocultarSkeletons();
    const grid        = document.getElementById('productosGrid');
    const sinResultados = document.getElementById('sinResultados');

    grid.innerHTML = '';
    if (lista.length === 0) {
        sinResultados.classList.remove('d-none');
        return;
    }
    sinResultados.classList.add('d-none');

    lista.forEach(p => grid.insertAdjacentHTML('beforeend', tarjetaHTML(p)));
}

function tarjetaHTML(p) {
    const stockBadge = p.stock <= 10
        ? `<span class="badge badge-stock-bajo">Stock bajo</span>`
        : `<span class="badge badge-stock-ok">Disponible</span>`;

    const precio = new Intl.NumberFormat('es-CO', {
        style: 'currency', currency: 'COP', maximumFractionDigits: 0
    }).format(p.precio);

    const imagen = p.imageUrl
        ? `<img src="${p.imageUrl}" class="card-img-top object-fit-cover"
               style="height:180px;" alt="${escHtml(p.nombre)}" loading="lazy">`
        : `<div class="bg-success bg-opacity-10 d-flex align-items-center
               justify-content-center" style="height:180px;">
               <i class="bi bi-box-seam text-success fs-1" aria-hidden="true"></i>
           </div>`;

    return `
    <div class="col">
        <article class="card card-producto h-100 shadow-sm border-0">
            <a href="/productos/${p.id}" class="text-decoration-none">
                ${imagen}
            </a>
            <div class="card-body d-flex flex-column">
                <div class="d-flex justify-content-between align-items-start mb-1">
                    <h2 class="h6 mb-0 fw-semibold text-dark">
                        <a href="/productos/${p.id}" class="text-dark stretched-link text-decoration-none">
                            ${escHtml(p.nombre)}
                        </a>
                    </h2>
                    ${stockBadge}
                </div>
                <p class="text-muted small mb-2 flex-grow-1">${escHtml(p.descripcion || '')}</p>
                <div class="d-flex justify-content-between align-items-center mt-auto pt-2 border-top">
                    <span class="fw-bold text-success fs-5">${precio}</span>
                    <span class="text-muted small">/${escHtml(p.unidad || 'ud')}</span>
                </div>
                <p class="text-muted small mb-0 mt-1">
                    <i class="bi bi-person me-1" aria-hidden="true"></i>${escHtml(p.productorNombre || '')}
                </p>
            </div>
        </article>
    </div>`;
}

/* ── Helpers ─────────────────────────────────── */
function mostrarSkeletons(n) {
    const grid     = document.getElementById('productosGrid');
    const skeleton = document.getElementById('skeletonTemplate');
    grid.innerHTML = '';
    for (let i = 0; i < n; i++) {
        grid.appendChild(skeleton.cloneNode(true));
    }
}

function ocultarSkeletons() {
    // renderProductos() reemplaza el contenido completo
}

function escHtml(str) {
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}
</script>

</body>
</html>
