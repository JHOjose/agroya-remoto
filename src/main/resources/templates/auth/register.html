<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{fragments/base :: head('Crear cuenta')}"></head>

<body>
<nav th:replace="~{fragments/base :: navbar}"></nav>

<main class="container py-5" style="max-width: 520px;">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5">

            <div class="text-center mb-4">
                <i class="bi bi-person-plus-fill text-success fs-1" aria-hidden="true"></i>
                <h1 class="h4 mt-2 mb-0 fw-semibold" th:text="#{nav.register}">Crear cuenta</h1>
            </div>

            <div id="alertContainer" role="alert" aria-live="polite"></div>

            <form id="registerForm" novalidate>

                <!-- Nombre y Apellido -->
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label for="nombre" class="form-label fw-medium"
                               th:text="#{register.name}">Nombre</label>
                        <input type="text" class="form-control" id="nombre"
                               required autocomplete="given-name"
                               th:placeholder="#{register.name.placeholder}">
                        <div class="invalid-feedback">Requerido</div>
                    </div>
                    <div class="col-6">
                        <label for="apellido" class="form-label fw-medium"
                               th:text="#{register.lastname}">Apellido</label>
                        <input type="text" class="form-control" id="apellido"
                               required autocomplete="family-name"
                               th:placeholder="#{register.lastname.placeholder}">
                        <div class="invalid-feedback">Requerido</div>
                    </div>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label for="email" class="form-label fw-medium"
                           th:text="#{login.email}">Correo electrónico</label>
                    <input type="email" class="form-control" id="email"
                           required autocomplete="email">
                    <div class="invalid-feedback">Ingresa un correo válido.</div>
                </div>

                <!-- Contraseña -->
                <div class="mb-3">
                    <label for="password" class="form-label fw-medium"
                           th:text="#{login.password}">Contraseña</label>
                    <input type="password" class="form-control" id="password"
                           required minlength="6" autocomplete="new-password">
                    <div class="form-text" th:text="#{register.password.hint}">
                        Mínimo 6 caracteres
                    </div>
                    <div class="invalid-feedback">Mínimo 6 caracteres.</div>
                </div>

                <!-- Teléfono -->
                <div class="mb-3">
                    <label for="telefono" class="form-label fw-medium"
                           th:text="#{register.phone}">Teléfono</label>
                    <input type="tel" class="form-control" id="telefono"
                           autocomplete="tel">
                </div>

                <!-- Municipio -->
                <div class="mb-3">
                    <label for="municipio" class="form-label fw-medium"
                           th:text="#{register.municipio}">Municipio</label>
                    <input type="text" class="form-control" id="municipio"
                           autocomplete="address-level2"
                           th:placeholder="#{register.municipio.placeholder}">
                </div>

                <!-- Rol -->
                <div class="mb-4">
                    <label class="form-label fw-medium" th:text="#{register.role}">
                        Tipo de cuenta
                    </label>
                    <div class="row g-2">
                        <!-- Comprador -->
                        <div class="col-6">
                            <input type="radio" class="btn-check" name="rol"
                                   id="rolComprador" value="comprador" checked>
                            <label class="btn btn-outline-success w-100 text-start p-3"
                                   for="rolComprador">
                                <i class="bi bi-cart3 me-2" aria-hidden="true"></i>
                                <strong th:text="#{register.role.buyer}">Comprador</strong>
                                <br>
                                <small class="text-muted" th:text="#{register.role.buyer.desc}">
                                    Quiero comprar productos
                                </small>
                            </label>
                        </div>
                        <!-- Productor -->
                        <div class="col-6">
                            <input type="radio" class="btn-check" name="rol"
                                   id="rolProductor" value="productor">
                            <label class="btn btn-outline-success w-100 text-start p-3"
                                   for="rolProductor">
                                <i class="bi bi-tree me-2" aria-hidden="true"></i>
                                <strong th:text="#{register.role.producer}">Productor</strong>
                                <br>
                                <small class="text-muted" th:text="#{register.role.producer.desc}">
                                    Quiero vender mis cosechas
                                </small>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-success btn-lg" id="btnRegister">
                        <span class="spinner-border spinner-border-sm d-none me-2"
                              id="regSpinner" role="status" aria-hidden="true"></span>
                        <span th:text="#{nav.register}">Crear cuenta</span>
                    </button>
                </div>
            </form>

            <hr class="my-4">
            <p class="text-center mb-0 small">
                <span th:text="#{register.have.account}">¿Ya tienes cuenta?</span>
                <a th:href="@{/login}" th:text="#{nav.login}" class="text-success fw-medium">
                    Inicia sesión
                </a>
            </p>
        </div>
    </div>
</main>

<div th:replace="~{fragments/base :: scripts}"></div>

<script>
document.getElementById('registerForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    if (!this.checkValidity()) { this.classList.add('was-validated'); return; }

    const btn     = document.getElementById('btnRegister');
    const spinner = document.getElementById('regSpinner');
    btn.disabled  = true;
    spinner.classList.remove('d-none');

    const rol = document.querySelector('input[name="rol"]:checked').value;

    try {
        await apiFetch('/api/auth/signup', {
            method: 'POST',
            body: JSON.stringify({
                nombre:    document.getElementById('nombre').value.trim(),
                apellido:  document.getElementById('apellido').value.trim(),
                email:     document.getElementById('email').value.trim(),
                password:  document.getElementById('password').value,
                telefono:  document.getElementById('telefono').value.trim(),
                municipio: document.getElementById('municipio').value.trim(),
                role:      [rol],
            }),
        });

        /* Registro exitoso → ir a login con mensaje */
        sessionStorage.setItem('agroya_msg',
            '¡Cuenta creada! Inicia sesión para continuar.');
        window.location.href = '/login';

    } catch (err) {
        mostrarAlerta(err.message || 'No se pudo crear la cuenta. Intenta de nuevo.');
    } finally {
        btn.disabled = false;
        spinner.classList.add('d-none');
    }
});
</script>

</body>
</html>
