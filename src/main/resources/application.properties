# =====================================================
#  AgroYa - application.properties
# =====================================================

spring.application.name=agroya-backend

# ── Base de datos ──────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/agroya_db
spring.datasource.username=alumno_eclipse
spring.datasource.password=123456
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── HTTPS
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=agroya123
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=agroya

# ── JWT
agroya.app.jwtSecret=SecretKeyForJWTGenerationThatIsLongEnoughToBeSecure1234567890
agroya.app.jwtExpirationMs=86400000

# ── Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ── Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── i18n
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# ── DevTools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true